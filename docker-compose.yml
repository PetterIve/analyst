name: analyst-wt1
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: analyst
      POSTGRES_DB: analyst
    ports:
      - "5435:5432"
    volumes:
      - analyst-pgdata-wt1:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyst -d analyst"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  analyst-pgdata-wt1:
