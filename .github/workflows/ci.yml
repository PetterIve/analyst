name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        # Tests don't connect, but `prisma generate` reads env via prisma.config,
        # so give it a dummy URL so resolution succeeds.
        env:
          DATABASE_URL: postgresql://analyst:analyst@localhost:5434/analyst
        run: npx prisma generate

      - name: Run tests
        env:
          DATABASE_URL: postgresql://analyst:analyst@localhost:5434/analyst
        run: npm test
